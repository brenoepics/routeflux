name: Continuous Integration

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@fd19e0626188613eec92a77e875180c6445b56ba # v1
        with:
          node-version: "22"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Build packages in dependency order
        run: |
          vp run core#build
          vp run adapter-react#build
          vp run adapter-vue#build
          vp run crawler-puppeteer#build
          vp run generators#build

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@4f8e94349a351df0f048634f25fec36c3c91eded # v2.1.1
        with:
          chrome-version: stable

      - name: Run checks
        id: check
        continue-on-error: true
        run: vp run check -r

      - name: Run builds
        id: build
        continue-on-error: true
        run: vp run build -r

      - name: Run tests
        id: test
        continue-on-error: true
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: vp run test -r

      - name: Write job summary
        if: always()
        env:
          CHECK_STATUS: ${{ steps.check.outcome }}
          TEST_STATUS: ${{ steps.test.outcome }}
          BUILD_STATUS: ${{ steps.build.outcome }}
        run: |
          status_icon() {
            case "$1" in
              success) printf '%s' 'SUCCESS';;
              failure) printf '%s' 'FAILED';;
              cancelled) printf '%s' 'CANCELLED';;
              skipped) printf '%s' 'SKIPPED';;
              *) printf '%s' 'UNKNOWN';;
            esac
          }

          {
            echo "## Continuous Integration"
            echo
            echo "| Step | Result |"
            echo "| --- | --- |"
            echo "| Check | $(status_icon "$CHECK_STATUS") |"
            echo "| Test | $(status_icon "$TEST_STATUS") |"
            echo "| Build | $(status_icon "$BUILD_STATUS") |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on pull request
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          CHECK_STATUS: ${{ steps.check.outcome }}
          TEST_STATUS: ${{ steps.test.outcome }}
          BUILD_STATUS: ${{ steps.build.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- ci-status-comment -->'
            const icon = (status) => {
              switch (status) {
                case 'success':
                  return 'SUCCESS'
                case 'failure':
                  return 'FAILED'
                case 'cancelled':
                  return 'CANCELLED'
                case 'skipped':
                  return 'SKIPPED'
                default:
                  return 'UNKNOWN'
              }
            }

            const check = process.env.CHECK_STATUS || 'unknown'
            const test = process.env.TEST_STATUS || 'unknown'
            const build = process.env.BUILD_STATUS || 'unknown'
            const overall = [check, test, build].every((status) => status === 'success') ? 'success' : 'failure'

            const body = [
              marker,
              '## Continuous Integration',
              '',
              `Overall: ${icon(overall)}`,
              '',
              '| Step | Result |',
              '| --- | --- |',
              `| Check | ${icon(check)} |`,
              `| Test | ${icon(test)} |`,
              `| Build | ${icon(build)} |`,
              '',
              `[View workflow run](${process.env.RUN_URL})`,
            ].join('\n')

            try {
              const { owner, repo } = context.repo
              const issue_number = context.issue.number
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              })
              const existing = comments.find((comment) => {
                return comment.user?.type === 'Bot' && comment.body?.includes(marker)
              })

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                })
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                })
              }
            } catch (error) {
              core.warning(`Unable to create or update PR comment: ${error.message}`)
            }

      - name: Fail workflow if any step failed
        if: always()
        env:
          CHECK_STATUS: ${{ steps.check.outcome }}
          TEST_STATUS: ${{ steps.test.outcome }}
          BUILD_STATUS: ${{ steps.build.outcome }}
        run: |
          if [ "$CHECK_STATUS" != "success" ] || [ "$TEST_STATUS" != "success" ] || [ "$BUILD_STATUS" != "success" ]; then
            exit 1
          fi
